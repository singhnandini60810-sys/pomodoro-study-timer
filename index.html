<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pomodoro Study Timer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Pomodoro Study Timer</h1>

<div class="timer">
<span id="minutes">25</span>:<span id="seconds">00</span>
</div>

<div class="progress-bar">
<div id="progress"></div>
</div>

<p>Sessions Completed: <span id="sessions">0</span></p>

<div class="buttons">
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
</div>

<button class="dark-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>

</div>

<audio id="alarm" src="alarm.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
